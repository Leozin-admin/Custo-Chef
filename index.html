<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlimTrack</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f0faf4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      color: #2e7d52;
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
    }

    p.subtitulo {
      color: #888;
      text-align: center;
      margin-bottom: 32px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #2e7d52;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #2e7d52;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button:hover {
      background: #245f40;
    }

    .link {
      text-align: center;
      color: #2e7d52;
      cursor: pointer;
      font-size: 14px;
    }

    .mensagem {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: red;
    }

    .mensagem.sucesso {
      color: #2e7d52;
    }

    #tela-dashboard {
      display: none;
    }

    .dado {
      background: #f0faf4;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .dado span {
      font-size: 13px;
      color: #888;
    }

    .dado p {
      font-size: 18px;
      font-weight: bold;
      color: #2e7d52;
    }
  </style>
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div class="container" id="tela-login">
    <h1>🥗 SlimTrack</h1>
    <p class="subtitulo">Sua jornada de emagrecimento</p>

    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <p class="link" onclick="mostrarCadastro()">Não tem conta? Cadastre-se</p>
    <p class="mensagem" id="login-msg"></p>
  </div>

  <!-- TELA DE CADASTRO -->
  <div class="container" id="tela-cadastro" style="display:none">
    <h1>🥗 SlimTrack</h1>
    <p class="subtitulo">Crie sua conta</p>

    <input type="text" id="cad-nome" placeholder="Nome">
    <input type="email" id="cad-email" placeholder="Email">
    <input type="password" id="cad-senha" placeholder="Senha">
    <button onclick="fazerCadastro()">Cadastrar</button>
    <p class="link" onclick="mostrarLogin()">Já tem conta? Faça login</p>
    <p class="mensagem" id="cad-msg"></p>
  </div>

  <!-- TELA DE DASHBOARD -->
  <div class="container" id="tela-dashboard">
    <h1>Olá, <span id="dash-nome"></span>! 👋</h1>
    <p class="subtitulo">Seu painel de emagrecimento</p>

    <div class="dado">
      <span>Email</span>
      <p id="dash-email"></p>
    </div>
    <div class="dado">
      <span>Membro desde</span>
      <p id="dash-criado"></p>
    </div>

    <button onclick="fazerLogout()">Sair</button>
  </div>

  <script>
    const API = 'http://localhost:3000';

    function mostrarCadastro() {
      document.getElementById('tela-login').style.display = 'none';
      document.getElementById('tela-cadastro').style.display = 'block';
    }

    function mostrarLogin() {
      document.getElementById('tela-cadastro').style.display = 'none';
      document.getElementById('tela-login').style.display = 'block';
    }

    async function fazerCadastro() {
      const nome = document.getElementById('cad-nome').value;
      const email = document.getElementById('cad-email').value;
      const senha = document.getElementById('cad-senha').value;

      const res = await fetch(API + '/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });

      const data = await res.json();
      const msg = document.getElementById('cad-msg');

      if (res.ok) {
        msg.className = 'mensagem sucesso';
        msg.textContent = 'Cadastrado com sucesso! Faça login.';
        setTimeout(mostrarLogin, 1500);
      } else {
        msg.className = 'mensagem';
        msg.textContent = data.message;
      }
    }

    async function fazerLogin() {
      const email = document.getElementById('login-email').value;
      const senha = document.getElementById('login-senha').value;

      const res = await fetch(API + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });

      const data = await res.json();
      const msg = document.getElementById('login-msg');

      if (res.ok) {
        localStorage.setItem('token', data.token);
        mostrarDashboard();
      } else {
        msg.className = 'mensagem';
        msg.textContent = data.message;
      }
    }

    async function mostrarDashboard() {
      const token = localStorage.getItem('token');

      const res = await fetch(API + '/perfil', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      const data = await res.json();

      document.getElementById('tela-login').style.display = 'none';
      document.getElementById('tela-cadastro').style.display = 'none';
      document.getElementById('tela-dashboard').style.display = 'block';

      document.getElementById('dash-nome').textContent = data.nome;
      document.getElementById('dash-email').textContent = data.email;
      document.getElementById('dash-criado').textContent = new Date(data.criadoEm).toLocaleDateString('pt-BR');
    }

    function fazerLogout() {
      localStorage.removeItem('token');
      document.getElementById('tela-dashboard').style.display = 'none';
      document.getElementById('tela-login').style.display = 'block';
    }

    // Verifica se já tem token salvo ao abrir a página
    if (localStorage.getItem('token')) {
      mostrarDashboard();
    }
  </script>

</body>
</html>
