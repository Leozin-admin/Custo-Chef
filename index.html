<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CustoChef</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background: linear-gradient(135deg, #1a0a00 0%, #3d1f00 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 400px;
    }

    h1 { color: #c45c00; font-size: 28px; margin-bottom: 8px; text-align: center; }

    p.subtitulo { color: #888; text-align: center; margin-bottom: 32px; }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 15px;
      outline: none;
    }

    input:focus { border-color: #c45c00; }

    button {
      width: 100%;
      padding: 13px;
      background: #c45c00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button:hover { background: #a34d00; }

    .link { text-align: center; color: #c45c00; cursor: pointer; font-size: 14px; }

    .mensagem { text-align: center; margin-top: 12px; font-size: 14px; color: red; }
    .mensagem.sucesso { color: #c45c00; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="container" id="tela-login">
    <h1>🍳 CustoChef</h1>
    <p class="subtitulo">Controle o custo do seu cardápio</p>

    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <p class="link" onclick="mostrarCadastro()">Não tem conta? Cadastre-se</p>
    <p class="mensagem" id="login-msg"></p>
  </div>

  <!-- CADASTRO -->
  <div class="container" id="tela-cadastro" style="display:none">
    <h1>🍳 CustoChef</h1>
    <p class="subtitulo">Crie sua conta</p>

    <input type="text" id="cad-nome" placeholder="Seu nome">
    <input type="email" id="cad-email" placeholder="Email">
    <input type="password" id="cad-senha" placeholder="Senha">
    <button onclick="fazerCadastro()">Cadastrar</button>
    <p class="link" onclick="mostrarLogin()">Já tem conta? Faça login</p>
    <p class="mensagem" id="cad-msg"></p>
  </div>

  <script>
    const API = 'http://localhost:3000';

    function mostrarCadastro() {
      document.getElementById('tela-login').style.display = 'none';
      document.getElementById('tela-cadastro').style.display = 'block';
    }

    function mostrarLogin() {
      document.getElementById('tela-cadastro').style.display = 'none';
      document.getElementById('tela-login').style.display = 'block';
    }

    async function fazerCadastro() {
      const nome = document.getElementById('cad-nome').value.trim();
      const email = document.getElementById('cad-email').value.trim();
      const senha = document.getElementById('cad-senha').value;
      const msg = document.getElementById('cad-msg');
      msg.className = 'mensagem';
      msg.textContent = '';

      if (!nome || !email || !senha) {
        msg.textContent = 'Preencha todos os campos.';
        return;
      }

      try {
        const res = await fetch(API + '/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, senha })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          msg.className = 'mensagem sucesso';
          msg.textContent = 'Cadastrado! Faça login.';
          document.getElementById('cad-nome').value = '';
          document.getElementById('cad-email').value = '';
          document.getElementById('cad-senha').value = '';
          setTimeout(mostrarLogin, 1500);
        } else {
          msg.textContent = data.message || 'Erro ao cadastrar.';
        }
      } catch {
        msg.textContent = 'Servidor offline.';
      }
    }

    async function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;
      const msg = document.getElementById('login-msg');
      const botao = document.querySelector('#tela-login button');
      msg.className = 'mensagem';
      msg.textContent = '';
      botao.disabled = true;
      botao.textContent = 'Entrando...';

      if (!email || !senha) {
        msg.textContent = 'Preencha e-mail e senha.';
        botao.disabled = false;
        botao.textContent = 'Entrar';
        return;
      }

      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          localStorage.setItem('token', data.token);
          msg.className = 'mensagem sucesso';
          msg.textContent = 'Login realizado! Redirecionando...';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
        } else {
          msg.textContent = data.message || 'Erro ao fazer login.';
        }
      } catch {
        msg.textContent = 'Servidor offline.';
      } finally {
        botao.disabled = false;
        botao.textContent = 'Entrar';
      }
    }

    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
